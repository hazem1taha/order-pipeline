version: '3.8'

services:
  localstack:
    image: localstack/localstack-community:latest
    ports:
      - "4566:4566"
    environment:
      SERVICES: dynamodb,sqs,eventbridge,lambda,iam,cloudwatchlogs
      START_WARM: '1'
      DEBUG: '1'
    volumes:
      - "${LOCALSTACK_DATA_DIR:-/tmp/localstack-data}:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 10s
