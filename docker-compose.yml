version: '3.8'

networks:
  pipeline:
    driver: bridge

services:
  localstack:
    image: localstack/localstack:latest
    networks:
      - pipeline
    ports:
      - "4566:4566"
    environment:
      SERVICES: dynamodb,sqs,events,lambda,iam,cloudwatchlogs
      LOCALSTACK_AUTH_TOKEN: ${LOCALSTACK_AUTH_TOKEN:-}
      ACTIVATE_PRO: '0'
      START_WARM: '1'
      DEBUG: '1'
    volumes:
      - "${LOCALSTACK_DATA_DIR:-/tmp/localstack-data}:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      AWS_REGION: eu-west-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      STAGE: local
      DYNAMODB_TABLE_NAME: orders-local
      EVENT_BUS_NAME: orders-bus-local
      LOCALSTACK_URL: http://localstack:4566
      IDEMPOTENCY_WINDOW_DAYS: '30'
      ENVIRONMENT: local
    networks:
      - pipeline
    volumes:
      - ./packages/backend/src:/app/packages/backend/src
    depends_on:
      localstack:
        condition: service_healthy
    restart: on-failure
